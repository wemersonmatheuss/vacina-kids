<article class="child-card">
  <div class="child-card__header">
    <div class="child-card__avatar" [class.child-card__avatar--female]="summary.child.gender === 'female'">
      {{ initials }}
    </div>

    <div class="child-card__info">
      <h3>{{ summary.child.name }}</h3>
      <span>{{ ageLabel }}</span>
    </div>
  </div>

  <div class="child-card__progress">
    <div class="child-card__progress-labels">
      <span>Situação vacinal</span>
      <strong>{{ progressPercent }}%</strong>
    </div>

    <div class="child-card__progress-bar">
      <div
        class="child-card__progress-fill"
        [style.width.%]="progressPercent"
      ></div>
    </div>
  </div>

  <div class="child-card__status" [class]="'child-card__status--' + statusType">
    <app-svg-icon
      [nome]="statusType === 'overdue' ? 'documento-atencao' : statusType === 'pending' ? 'calendario' : 'check-escudo'"
      [cor]="statusType === 'overdue' ? '#FDA769' : statusType === 'pending' ? '#FEC868' : '#ABC270'"
      [tamanho]="18"
    />
    {{ statusLabel }}
  </div>
</article>
