<ion-content fullscreen>
  <div class="layout">
    <app-header title="Vacina Kids" />

    <div class="layout-shell">
      <aside class="desktop-sidebar">
        <nav class="desktop-sidebar__nav" aria-label="Navegação principal desktop">
          @for (item of navigationItems; track item.route) {
            <a
              [routerLink]="item.route"
              routerLinkActive="desktop-sidebar__link--active"
              [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
              class="desktop-sidebar__link"
            >
              <app-svg-icon [nome]="item.icon" cor="#473C33" [tamanho]="20" />
              <span>{{ item.label }}</span>
            </a>
          }
        </nav>
      </aside>

      <main class="content">
        <router-outlet />
      </main>
    </div>

    <nav class="mobile-bottom-nav" aria-label="Navegação principal mobile">
      @for (item of navigationItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="mobile-bottom-nav__item--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="mobile-bottom-nav__item"
        >
          <app-svg-icon [nome]="item.icon" cor="#473C33" [tamanho]="20" />
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
</ion-content>
